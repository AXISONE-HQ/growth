# Cloud Build pipeline for @growth-ai/connectors.
# Mirrors the existing cloudbuild.yaml / cloudbuild-web.yaml pattern.
#
# Trigger on pushes to main, path filter: apps/connectors/** or
# packages/connector-contracts/** or packages/db/**.

steps:
  # ─── Build image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-f'
      - 'apps/connectors/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/growth-connectors:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/growth-connectors:latest'
      - '.'

  # ─── Push to GCR ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/growth-connectors']

  # ─── Deploy to Cloud Run ────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'growth-connectors'
      - '--image=gcr.io/$PROJECT_ID/growth-connectors:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=connectors-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID'
      - '--set-secrets=INTERNAL_TRPC_AUTH_TOKEN=connectors-internal-trpc-token:latest,DATABASE_URL=growth-database-url:latest,REDIS_URL=growth-redis-url:latest'
      - '--vpc-connector=growth-vpc-connector'
      - '--ingress=internal-and-cloud-load-balancing'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=30s'
      - '--no-allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/growth-connectors:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/growth-connectors:latest'
