# Cloud Build  growth Web (Next.js)
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web:latest'
      - '-f'
      - 'infra/docker/Dockerfile.web'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'growth-web'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-web:latest'
