## Cloud Build — API Staging Deployment
## Trigger: push to main branch (automatic)
## Deploys to: growth-api-staging Cloud Run service

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api:staging'
      - '-f'
      - 'infra/docker/Dockerfile.api'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api'

  # Deploy to Cloud Run (staging)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'growth-api-staging'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=staging'
      - '--update-secrets'
      - 'DATABASE_URL=growth-db-url-staging:latest,REDIS_URL=growth-redis-url-staging:latest,ANTHROPIC_API_KEY=growth-anthropic-key:latest,SENDGRID_API_KEY=growth-sendgrid-key:latest,TWILIO_AUTH_TOKEN=growth-twilio-token:latest,STRIPE_SECRET_KEY=growth-stripe-key-staging:latest,NANGO_SECRET_KEY=growth-nango-key:latest'
      - '--max-instances'
      - '2'
      - '--memory'
      - '512Mi'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/growth-images/growth-api:staging'
