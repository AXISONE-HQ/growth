name: Deploy Connectors to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/connectors/**'
      - 'packages/**'
      - '.github/workflows/deploy-connectors.yml'
  workflow_dispatch:

env:
  PROJECT_ID: growth-493400
  REGION: us-central1
  SERVICE_NAME: growth-connectors
  IMAGE: gcr.io/growth-493400/growth-connectors

jobs:
  build-and-deploy:
    name: Build & Deploy Connectors
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f apps/connectors/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # KAN-1030 — send-redirect guardrail (founder mandate 2026-05-25).
          # Default-ON test-recipient override at the channel-adapter
          # choke-point: every Resend / Twilio / future-channel send gets
          # rerouted to the founder's test contacts while ENABLED=true.
          # `--update-env-vars` MERGES with the service's existing env (set
          # out-of-band via gcloud) — does NOT wipe DATABASE_URL / GCP_PROJECT_ID /
          # secrets / etc. Disabling for real production sends is an
          # explicit env change to `false` — document loudly + alert before
          # flipping (sibling posture to the autoApproveEnabled kill-switch).
          # See apps/connectors/src/adapters/_shared/send-redirect.ts.
          flags: '--update-env-vars=SEND_REDIRECT_ENABLED=true,SEND_REDIRECT_EMAIL=fred@axisone.ca,SEND_REDIRECT_PHONE=+15148359958'

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: $URL"
