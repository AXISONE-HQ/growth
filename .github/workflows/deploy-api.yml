name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID: growth-493400
  REGION: us-central1
  SERVICE_NAME: growth-api
  IMAGE: gcr.io/growth-493400/growth-api
  # KAN-709: Cloud SQL instance the migrate step proxies to. Must match the
  # instance configured for the running Cloud Run revision.
  CLOUD_SQL_INSTANCE: growth-493400:us-central1:growth-db

jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    # KAN-747: Postgres service for the smoke-container-health gate.
    # Empty schema (seeded by prisma migrate deploy in the composite). Used
    # only to satisfy DATABASE_URL parsing at container module-load — /health
    # doesn't query the DB.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: growth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # KAN-709: prisma migrate deploy (path-gated)
      #
      # Runs BEFORE Docker build/deploy so the new container only ships once
      # the DB is on the new schema. If migrate fails, no Cloud Run rollout —
      # old container keeps serving against the old (matching) schema.
      #
      # Path-gated to schema/migration changes so non-schema PRs skip the
      # ~30-60s proxy + install overhead.
      # ─────────────────────────────────────────────

      - name: Detect schema changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            schema:
              - 'packages/db/prisma/schema.prisma'
              - 'packages/db/prisma/migrations/**'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # KAN-709 v4: all migrate-related setup steps gated on
      # `github.event_name == 'push'` AND schema-changed. Manual workflow_dispatch
      # skips the entire migrate path (no surprise migrations on ops-triggered
      # redeploys). See `feedback_dorny_paths_filter_workflow_dispatch_footgun.md`
      # in personal memory for the underlying dorny/paths-filter@v3 quirk.
      - name: Set up Node (for prisma migrate deploy)
        if: github.event_name == 'push' && steps.filter.outputs.schema == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (for prisma migrate deploy)
        if: github.event_name == 'push' && steps.filter.outputs.schema == 'true'
        run: npm ci

      - name: Download Cloud SQL Auth Proxy
        if: github.event_name == 'push' && steps.filter.outputs.schema == 'true'
        run: |
          curl -sLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      # KAN-709 v3 + v4: single-step migrate pattern with proxy log-tail readiness
      # check (E1) + retry loop around migrate (E3) + workflow_dispatch gate.
      #
      # v3 (single-step): proxy + migrate + status + cleanup all live in ONE
      # step's bash session — eliminates the cross-step process reaping that
      # killed v2. Phase markers `[KAN-709-v4] phase=…` make failure isolation
      # greppable; trap ensures the proxy dies cleanly even when migrate fails.
      #
      # v4 (E1, this iteration): replace `nc -z` (TCP-bind only) readiness
      # check with `grep "ready for new connections" proxy.log` — the Cloud
      # SQL Auth Proxy's own canonical ready signal. v3 failed with P1001 on
      # KAN-705 PR #47 because TCP listener bound BEFORE the proxy finished
      # its async Cloud SQL Admin API auth handshake — `nc -z` passed but the
      # proxy returned connection-refused 1-2s later when Prisma actually
      # opened a Postgres connection.
      #
      # v4 (E3, this iteration): retry `prisma migrate deploy` up to 3 times
      # with 5s backoff. Defense-in-depth against any transient post-ready
      # blip (proxy reconnect, Cloud SQL Admin API hiccup). Phase markers
      # capture attempt count so the GHA log makes failure mode clear.
      #
      # v4 (workflow_dispatch gate): `github.event_name == 'push'` added to
      # the if-condition. dorny/paths-filter@v3 has no comparison ref on
      # workflow_dispatch and defaults `schema=true` — without this gate,
      # manual dispatch triggers an unwanted migrate run. Push events with
      # real schema changes still RUN; manual dispatch becomes
      # "deploy-only, no migrate" which is the safer ops posture.
      #
      # Port 5433 — matches the local-dev convention (`feedback_proxy_5433_
      # points_at_prod`) AND avoids the job-level Postgres service KAN-747
      # added at port 5432:5432 for the smoke gate. The collision surfaced on
      # KAN-750's deploy (run 25126012445) — the first schema-touching PR
      # after KAN-747's service landed. Lesson + audit pattern in
      # `feedback_job_level_vs_step_level_resource_collision` + KAN-755.
      # Until then 5432 worked because no other listener existed; the smoke
      # gate's empty-schema Postgres now occupies it before this step runs.
      - name: Run migrate end-to-end (proxy + deploy + status + cleanup)
        if: github.event_name == 'push' && steps.filter.outputs.schema == 'true'
        run: |
          set -euo pipefail
          PROXY_PID=""
          trap '[ -n "$PROXY_PID" ] && kill "$PROXY_PID" 2>/dev/null || true' EXIT INT TERM

          echo "[KAN-709-v4] phase=proxy_start"
          ./cloud-sql-proxy --port 5433 ${{ env.CLOUD_SQL_INSTANCE }} > proxy.log 2>&1 &
          PROXY_PID=$!
          echo "[KAN-709-v4] proxy started PROXY_PID=$PROXY_PID"

          echo "[KAN-709-v4] phase=proxy_wait waiting for proxy ready log line"
          if ! timeout 60 bash -c 'until grep -q "ready for new connections" proxy.log 2>/dev/null; do sleep 1; done'; then
            echo "[KAN-709-v4] phase=proxy_wait FAILED — proxy did not signal ready within 60s"
            echo "--- proxy.log dump ---"
            cat proxy.log || true
            echo "--- end proxy.log ---"
            exit 1
          fi
          echo "[KAN-709-v4] phase=proxy_wait proxy signaled ready"

          echo "[KAN-709-v4] phase=db_url"
          # RAW_URL must be exported so the node child process inherits it via
          # process.env (KAN-709 v2 lesson). Without `export`, the assignment
          # is shell-local and `node -e` sees process.env.RAW_URL as undefined.
          export RAW_URL=$(gcloud secrets versions access latest --secret=growth-db-url-production --project=${{ env.PROJECT_ID }})
          export DATABASE_URL=$(node -e "const u = new URL(process.env.RAW_URL); u.host = '127.0.0.1:5433'; u.searchParams.delete('host'); console.log(u.toString());")
          cd packages/db

          echo "[KAN-709-v4] phase=migrate_deploy attempt=1"
          for attempt in 1 2 3; do
            if npx prisma migrate deploy 2>&1; then
              echo "[KAN-709-v4] phase=migrate_deploy succeeded attempt=$attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "[KAN-709-v4] phase=migrate_deploy attempt=$attempt failed, sleeping 5s"
              sleep 5
              echo "[KAN-709-v4] phase=migrate_deploy attempt=$((attempt+1))"
            else
              echo "[KAN-709-v4] phase=migrate_deploy all 3 attempts failed — dumping proxy log:"
              cat ../../proxy.log || true
              exit 1
            fi
          done

          echo "[KAN-709-v4] phase=migrate_status"
          npx prisma migrate status

          echo "[KAN-709-v4] phase=cleanup"
          # Trap will kill the proxy on EXIT — no manual kill needed.
          echo "[KAN-709-v4] phase=done"

      - name: Migration summary
        if: github.event_name == 'push' && steps.filter.outputs.schema == 'true'
        run: |
          echo "## KAN-709 v4 Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Schema-changing PR detected** — \`prisma migrate deploy\` ran against \`${{ env.CLOUD_SQL_INSTANCE }}\` in a single-step pattern (proxy log-tail readiness + retry loop + cleanup) before Cloud Run rollout." >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────
      # Cloud Run deploy
      # ─────────────────────────────────────────────

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ─────────────────────────────────────────────
      # KAN-747: container health smoke gate
      #
      # Runs the freshly-built+pushed image against an ephemeral Postgres
      # service and asserts /health returns 200 within 30s. Catches the
      # Dockerfile-class gaps that bit Sprint 3 — KAN-737 workspace dist +
      # KAN-742 bcrypt postinstall — BEFORE a broken revision deploys.
      #
      # If the smoke step fails, the next step (Deploy to Cloud Run) is
      # skipped. No broken revision lands. Same fail-fast posture as the
      # migrate gate above.
      #
      # Composite action self-documents the gate's catch list + anti-pattern
      # guards. See .github/actions/smoke-container-health/action.yml.
      # ─────────────────────────────────────────────
      - name: Smoke-test container health (KAN-747)
        uses: ./.github/actions/smoke-container-health
        with:
          image-tag: ${{ env.IMAGE }}:${{ github.sha }}
          app-name: apps/api
          port: '8080'
          health-path: '/health'

      # ─────────────────────────────────────────────
      # KAN-920 — explicit resource flags + post-deploy verification.
      #
      # Pre-KAN-920: deploy step took only `service / region / image` and
      # inherited memory/timeout/cpu/concurrency/min-instances from the
      # prior revision. KAN-919's 2Gi/3600s recovery bump (2026-05-13) held
      # across 4 deploys but was one rogue deploy away from silent regression
      # to defaults (1Gi/300s/cpu=1/concurrency=80/min=0).
      #
      # Resource flags below match the current PROD config exactly. The
      # verification step (next) hard-fails the workflow on any drift.
      #
      # Memory: 2Gi   — bumped from default 1Gi via KAN-919 recovery.
      # Timeout: 3600s — bumped from default 300s for synchronous large-import
      #                  commit. KAN-927 follow-up may relax once async lands.
      # CPU: 1        — explicit for verification parity.
      # Concurrency: 80 — explicit, load-bearing for cost.
      # min-instances: 1 — always-warm for sub-second cold-start UX.
      #
      # max-instances NOT pinned — autoscaler default (currently 10) is free
      # to grow with traffic. Deliberate bumps via `gcloud run services update`
      # outside this workflow.
      #
      # Annotations (startup-cpu-boost, autoscaling.knative.dev/, cloudsql-
      # instances) NOT enforced here — deploy-cloudrun@v2 handles annotations
      # awkwardly; file as KAN-XXX-followup if annotation drift ever surfaces
      # a real incident. Not blocking for resource-drift class fix.
      #
      # DO NOT reduce memory/timeout without coordinating with KAN-919's
      # stuck-commit performance profile. Default values caused 3+ hang
      # incidents on deals imports >~3500 rows (KAN-927).
      # ─────────────────────────────────────────────

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --memory=2Gi
            --timeout=3600s
            --cpu=1
            --concurrency=80
            --min-instances=1
            --vpc-egress=private-ranges-only
            --network=default
            --subnet=default
          # KAN-1010 M1 closing smoke discovery (2026-05-25): growth-api had
          # zero VPC connectivity, so the PR4 cost-cap path couldn't reach
          # Memorystore (`10.0.1.3`), the ioredis client DNS-failed every
          # ~2s on the literal "placeholder" secret value, and Gate-4 fell
          # to fail-closed (`cost_signal_unavailable`). The imperative fix
          # (`gcloud run services update growth-api --vpc-egress=...`) was
          # applied 2026-05-25 01:33Z; this commit pins those flags into
          # the deploy so subsequent deploys preserve the egress config
          # (deploy-cloudrun@v2 with no VPC flags would preserve previously-
          # set VPC config in practice, but PO direction is belt-and-
          # suspenders: pin the flags + extend KAN-920 drift guard below).
          # private-ranges-only routes only RFC-1918 traffic through the
          # VPC (Memorystore included); public traffic (Anthropic, Resend,
          # Twilio, Stripe, HubSpot, Sendgrid) continues on Cloud Run's
          # default direct path. all-traffic would sever public egress
          # because the project has ZERO Cloud NAT routers (verified
          # 2026-05-25 via `gcloud compute routers list`). Default network
          # + default subnet are us-central1 (10.128.0.0/20), same region
          # as growth-cache (us-central1-a) and the service. Tracked into
          # Terraform proper by KAN-1014.
          # KAN-1009 SAE PR4 — wire REDIS_URL for the cost-cap counter in
          # decision-run-push. Secret name matches the canonical production
          # secret used by the live connectors service (verified via
          # `gcloud run services describe growth-connectors`); the
          # `-production` suffix mirrors growth-db-url-production. The stale
          # cloudbuild-connectors.yaml string `growth-redis-url:latest` is
          # an unused artifact (the file doesn't drive any active CI flow);
          # do not copy from there. Also wires the api-rate-limit +
          # api-idempotency code paths that previously defaulted to
          # localhost:6379 in PROD (silent fail; out of scope to fix here
          # but no longer broken once REDIS_URL injects).
          secrets: |
            REDIS_URL=growth-redis-url-production:latest
          # KAN-1009 — env-default for the daily LLM cost cap when
          # Tenant.dailyLlmCostCapUsd is NULL. Conservative $10/day at
          # PR4 ship; tunable via Cloud Run revision update (or per-
          # tenant override via the new Tenant.dailyLlmCostCapUsd column).
          #
          # KAN-1028 — DISABLE_AGENTIC_SHADOW=true: smoke-window env gate
          # that disables the parallel agentic-shadow LLM dispatch in
          # `runShadow` (see packages/api/src/services/run-decision-for-
          # contact.ts:loadAgenticLoop). runFreeform (the rules-based
          # path) is LLM-free; all observed incident spend in 2026-05-25
          # came from the parallel shadow. With this env set, M1
          # escalate-only smoke runs at $0 LLM cost. Lose: shadow-
          # divergence telemetry for the smoke window only (M1 doesn't
          # consume it). Remove via separate small PR at M1-close, OR
          # keep on per the M1-prod shadow-on/off product decision PO
          # flagged at KAN-1028 review.
          env_vars: |
            DECISION_RUN_DAILY_COST_CAP_USD_DEFAULT=10.0
            DISABLE_AGENTIC_SHADOW=true
            SEND_REDIRECT_ENABLED=true
            SEND_REDIRECT_EMAIL=fred@axisone.ca
            SEND_REDIRECT_PHONE=+15148359958

      # KAN-920 — post-deploy config drift guard. Hard-fails the workflow
      # if the just-deployed revision's serving config doesn't match the
      # flags above.
      #
      # Reads the service's CURRENTLY-SERVING revision config. Assumes
      # single-deploy single-revision (no traffic splits). If we add gradual
      # rollouts via traffic splitting (KAN-XXX-followup), this verification
      # needs to assert config on the NEW revision specifically via
      # `--revision=$NEW_REVISION` rather than the service-level view.
      #
      # NOTE: A verification failure marks the workflow red but does NOT
      # automatically roll back the deployed revision. The bad revision is
      # already serving traffic. Manual recovery:
      #   gcloud run services update growth-api --region=us-central1 \
      #     --memory=2Gi --timeout=3600s --cpu=1 --concurrency=80 \
      #     --min-instances=1 --vpc-egress=private-ranges-only \
      #     --network=default --subnet=default
      # Or rollback to prior revision via:
      #   gcloud run services update-traffic growth-api --region=us-central1 \
      #     --to-revisions=<prior-rev>=100
      - name: Verify Cloud Run config (KAN-920 drift guard)
        run: |
          set -euo pipefail
          EXPECTED_MEMORY="2Gi"
          EXPECTED_TIMEOUT="3600"
          EXPECTED_CPU="1"
          EXPECTED_CONCURRENCY="80"
          EXPECTED_MIN_INSTANCES="1"
          # KAN-1010 M1 closing smoke (2026-05-25): VPC egress added to
          # the gate. Memorystore (10.0.1.3) is only reachable via VPC;
          # without these flags the cost-cap gate falls to fail-closed and
          # silent-skip becomes invisible until manual log forensics catch
          # it. Probed live: vpc-access-egress annotation returns the
          # literal string "private-ranges-only"; network-interfaces
          # returns the compact JSON `[{"network":"default","subnetwork":"default"}]`
          # (46 chars, no whitespace — deterministic per gcloud output).
          # If Cloud Run ever changes its JSON serialization, this check
          # will false-alarm and need re-pinning against the new shape.
          EXPECTED_VPC_EGRESS="private-ranges-only"
          EXPECTED_NETWORK_INTERFACES='[{"network":"default","subnetwork":"default"}]'
          # gcloud value() format separates fields with tab — confirmed via
          # `od -c` on the local proxy session 2026-05-19. cut -f with default
          # tab delimiter is correct.
          ACTUAL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(spec.template.spec.containers[0].resources.limits.memory,spec.template.spec.timeoutSeconds,spec.template.spec.containers[0].resources.limits.cpu,spec.template.spec.containerConcurrency,spec.template.metadata.annotations[autoscaling.knative.dev/minScale],spec.template.metadata.annotations[run.googleapis.com/vpc-access-egress],spec.template.metadata.annotations[run.googleapis.com/network-interfaces])')
          ACTUAL_MEMORY=$(echo "$ACTUAL" | cut -f1)
          ACTUAL_TIMEOUT=$(echo "$ACTUAL" | cut -f2)
          ACTUAL_CPU=$(echo "$ACTUAL" | cut -f3)
          ACTUAL_CONCURRENCY=$(echo "$ACTUAL" | cut -f4)
          ACTUAL_MIN_INSTANCES=$(echo "$ACTUAL" | cut -f5)
          ACTUAL_VPC_EGRESS=$(echo "$ACTUAL" | cut -f6)
          ACTUAL_NETWORK_INTERFACES=$(echo "$ACTUAL" | cut -f7)
          echo "Expected: memory=$EXPECTED_MEMORY timeout=$EXPECTED_TIMEOUT cpu=$EXPECTED_CPU concurrency=$EXPECTED_CONCURRENCY min=$EXPECTED_MIN_INSTANCES vpc-egress=$EXPECTED_VPC_EGRESS network-interfaces=$EXPECTED_NETWORK_INTERFACES"
          echo "Actual:   memory=$ACTUAL_MEMORY timeout=$ACTUAL_TIMEOUT cpu=$ACTUAL_CPU concurrency=$ACTUAL_CONCURRENCY min=$ACTUAL_MIN_INSTANCES vpc-egress=$ACTUAL_VPC_EGRESS network-interfaces=$ACTUAL_NETWORK_INTERFACES"
          if [ "$ACTUAL_MEMORY" != "$EXPECTED_MEMORY" ] \
            || [ "$ACTUAL_TIMEOUT" != "$EXPECTED_TIMEOUT" ] \
            || [ "$ACTUAL_CPU" != "$EXPECTED_CPU" ] \
            || [ "$ACTUAL_CONCURRENCY" != "$EXPECTED_CONCURRENCY" ] \
            || [ "$ACTUAL_MIN_INSTANCES" != "$EXPECTED_MIN_INSTANCES" ] \
            || [ "$ACTUAL_VPC_EGRESS" != "$EXPECTED_VPC_EGRESS" ] \
            || [ "$ACTUAL_NETWORK_INTERFACES" != "$EXPECTED_NETWORK_INTERFACES" ]; then
            echo "::error::KAN-920 config drift detected — bad revision is already serving traffic. Manual recovery needed (see deploy-api.yml header comment)."
            exit 1
          fi
          echo "## KAN-920 Config Verification" >> $GITHUB_STEP_SUMMARY
          echo "- memory=$ACTUAL_MEMORY ✓" >> $GITHUB_STEP_SUMMARY
          echo "- timeout=${ACTUAL_TIMEOUT}s ✓" >> $GITHUB_STEP_SUMMARY
          echo "- cpu=$ACTUAL_CPU ✓" >> $GITHUB_STEP_SUMMARY
          echo "- concurrency=$ACTUAL_CONCURRENCY ✓" >> $GITHUB_STEP_SUMMARY
          echo "- min-instances=$ACTUAL_MIN_INSTANCES ✓" >> $GITHUB_STEP_SUMMARY
          echo "- vpc-egress=$ACTUAL_VPC_EGRESS ✓" >> $GITHUB_STEP_SUMMARY
          echo "- network-interfaces=$ACTUAL_NETWORK_INTERFACES ✓" >> $GITHUB_STEP_SUMMARY

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: $URL"
