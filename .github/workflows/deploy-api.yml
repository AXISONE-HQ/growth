name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID: growth-493400
  REGION: us-central1
  SERVICE_NAME: growth-api
  IMAGE: gcr.io/growth-493400/growth-api
  # KAN-709: Cloud SQL instance the migrate step proxies to. Must match the
  # instance configured for the running Cloud Run revision.
  CLOUD_SQL_INSTANCE: growth-493400:us-central1:growth-db

jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # KAN-709: prisma migrate deploy (path-gated)
      #
      # Runs BEFORE Docker build/deploy so the new container only ships once
      # the DB is on the new schema. If migrate fails, no Cloud Run rollout —
      # old container keeps serving against the old (matching) schema.
      #
      # Path-gated to schema/migration changes so non-schema PRs skip the
      # ~30-60s proxy + install overhead.
      # ─────────────────────────────────────────────

      - name: Detect schema changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            schema:
              - 'packages/db/prisma/schema.prisma'
              - 'packages/db/prisma/migrations/**'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node (for prisma migrate deploy)
        if: steps.filter.outputs.schema == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (for prisma migrate deploy)
        if: steps.filter.outputs.schema == 'true'
        run: npm ci

      - name: Download Cloud SQL Auth Proxy
        if: steps.filter.outputs.schema == 'true'
        run: |
          curl -sLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      # KAN-709 v3: single-step migrate pattern. Proxy + migrate + status +
      # cleanup all live in ONE step's bash session — eliminates the cross-step
      # process reaping that killed v2 (GHA terminates each step's bash session
      # on exit, taking backgrounded children with it; PROXY_PID survives via
      # $GITHUB_ENV but the actual process does not). Phase markers
      # `[KAN-709-v3] phase=…` make failure isolation greppable; trap ensures
      # the proxy dies cleanly even when migrate fails.
      #
      # Port 5432 (not 5433 like local dev): the GHA runner is a fresh VM with
      # nothing else listening, so the Postgres default port is fine + matches
      # the most natural connection-string pattern. Local dev uses 5433 to
      # dodge any local Postgres conflicts.
      - name: Run migrate end-to-end (proxy + deploy + status + cleanup)
        if: steps.filter.outputs.schema == 'true'
        run: |
          set -euo pipefail
          PROXY_PID=""
          trap '[ -n "$PROXY_PID" ] && kill "$PROXY_PID" 2>/dev/null || true' EXIT INT TERM

          echo "[KAN-709-v3] phase=proxy_start"
          ./cloud-sql-proxy --port 5432 ${{ env.CLOUD_SQL_INSTANCE }} > proxy.log 2>&1 &
          PROXY_PID=$!
          echo "[KAN-709-v3] proxy started PROXY_PID=$PROXY_PID"

          echo "[KAN-709-v3] phase=proxy_wait"
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432 2>/dev/null; then
              echo "[KAN-709-v3] proxy ready on 5432 after ${i}s"
              break
            fi
            sleep 1
          done
          if ! nc -z 127.0.0.1 5432 2>/dev/null; then
            echo "[KAN-709-v3] proxy never bound 5432 — dumping log:"
            cat proxy.log
            exit 1
          fi

          echo "[KAN-709-v3] phase=db_url"
          # RAW_URL must be exported so the node child process inherits it via
          # process.env (KAN-709 v2 lesson). Without `export`, the assignment
          # is shell-local and `node -e` sees process.env.RAW_URL as undefined.
          export RAW_URL=$(gcloud secrets versions access latest --secret=growth-db-url-production --project=${{ env.PROJECT_ID }})
          export DATABASE_URL=$(node -e "const u = new URL(process.env.RAW_URL); u.host = '127.0.0.1:5432'; u.searchParams.delete('host'); console.log(u.toString());")

          echo "[KAN-709-v3] phase=migrate_deploy"
          cd packages/db
          npx prisma migrate deploy

          echo "[KAN-709-v3] phase=migrate_status"
          npx prisma migrate status

          echo "[KAN-709-v3] phase=cleanup"
          # Trap will kill the proxy on EXIT — no manual kill needed.
          echo "[KAN-709-v3] done"

      - name: Migration summary
        if: steps.filter.outputs.schema == 'true'
        run: |
          echo "## KAN-709 v3 Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Schema-changing PR detected** — \`prisma migrate deploy\` ran against \`${{ env.CLOUD_SQL_INSTANCE }}\` in a single-step pattern (proxy + deploy + status + cleanup) before Cloud Run rollout." >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────
      # Cloud Run deploy
      # ─────────────────────────────────────────────

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: $URL"
