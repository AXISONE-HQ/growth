name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/db
      - name: Lint
        run: npm run lint

      # KAN-1017 (CI Gate Audit KAN-1016, third leg) — packages/api typecheck
      # baseline gate. The engine's core package (runDecisionForContact,
      # agentic-tools, strategy/action/confidence pipeline, gap analyzer,
      # message-composer, brain-service) was previously not typechecked in
      # CI — four of the seven M1 closing-smoke bugs hid behind that gap
      # (schema drift, `as any` cast bombs, Zod vocab + nullability
      # mismatches; bugs #4–#7 in the M1 closing report).
      #
      # The gate normalizes tsc output (drops (line,col) so code-shuffles
      # don't false-trip) and compares against the committed baseline at
      # packages/api/.tsc-baseline.txt. Only NEW error CLASSES fail. The
      # existing ~79-signature cohort (Sprint-6 G1-G4, KAN-1019/1020/1021
      # cleanup territory) is allowed to pass; reductions are encouraged
      # (gate emits a hint to refresh the baseline when signatures drop).
      #
      # Same "stop new, baseline existing" posture as the chronically-red
      # Build job + the comm-23 zero-new gate used during the M1 smoke.
      - name: 'KAN-1017: packages/api typecheck baseline gate'
        run: ./scripts/typecheck-baseline-gate.sh packages/api

      # KAN-1011 (CI Gate Audit KAN-1016, second leg) — apps/web typecheck
      # baseline gate. The web app ships with
      # `typescript: { ignoreBuildErrors: true }` in next.config.mjs, so
      # `next build` runs zero TypeScript checking — the gap that let
      # M1-smoke bug #1 (activateMutation-undefined render crash) ship to
      # PROD. This standalone gate runs the same tsc invocation `next
      # build` would run if `ignoreBuildErrors` were false, against a
      # committed signature baseline (apps/web/.tsc-baseline.txt). Only
      # NEW error signatures fail.
      #
      # End-state target (separate follow-up PR, not this PR): once the
      # cohort is shrunk, flip `ignoreBuildErrors: false` so `next build`
      # itself typechecks — and this standalone gate retires. Until then,
      # the gate runs alongside the untouched `next build` flow.
      #
      # Reuses the parameterized typecheck-baseline-gate.sh — same
      # mechanism as KAN-1017 (packages/api), same portability fixes
      # (LC_ALL=C sort, absolute-path strip, --incremental false for
      # determinism across .tsbuildinfo cache states).
      - name: 'KAN-1011: apps/web typecheck baseline gate'
        run: ./scripts/typecheck-baseline-gate.sh apps/web

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/db
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test

  # KAN-1112 — Integration test job. Runs against a real Postgres + pgvector
  # service container (Option A docker-compose baseline) on every PR.
  #
  # Why this job exists: the KAN-1089 → KAN-1111 → KAN-1115 cluster proved
  # mocked $queryRaw + mocked sentinel-shape tests pass CI while the SQL is
  # syntactically broken (KAN-1089 alias GROUP BY, KAN-1111 ::uuid cast) or
  # the backend handler branches wrong (KAN-1115 empty-state-skip-eval).
  # This job is the bug-class fix: every new $queryRaw / $executeRaw OR
  # behavior-asserting backend handler MUST ship with at least one test in
  # apps/api/src/__tests__/integration/*.test.ts. Discipline memo:
  # `feedback_query_raw_sql_must_have_integration_test_exercising_real_postgres.md`.
  #
  # The Postgres service container uses the pgvector/pgvector:pg15 image to
  # match docker-compose.test.yml (local parity). DATABASE_URL points at
  # localhost:5433 (matches local-run + vitest.config.integration.ts default).
  # Migrations apply via `prisma migrate deploy` before tests run.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: growth_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d growth_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/growth_test
      GCP_PROJECT_ID: test-project
      INTERNAL_TRPC_AUTH_TOKEN: test-token-at-least-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/db
      # KAN-1151 fix-forward — vitest integration tests import from @growth/shared
      # at module-load time; package.json points main → dist/index.js which
      # doesn't exist on cold checkout. Mirrors the Web Build job's pattern.
      # Without this step, Vite raises "Failed to resolve entry for package
      # @growth/shared" before any test runs.
      - name: Build @growth/shared (workspace dependency)
        run: npm run build --workspace=@growth/shared
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
      - name: Run integration tests
        run: npx vitest run --config apps/connectors/vitest.config.integration.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/db
      - name: Build
        run: npm run build

  # KAN-975 — dedicated Next.js production-build gate.
  #
  # Why this exists: the `build` job above runs `turbo run build` across all
  # workspaces. The apps/api workspace has chronic typecheck-baseline errors
  # (KAN-474 / KAN-689 / KAN-702 cohorts) that fail FIRST in topo-order, so
  # apps/web's `next build` is NEVER REACHED under turbo. PostCSS / CSS /
  # Next-specific build errors slipped through to Cloud Run Deploy. KAN-974
  # was the concrete bite (a CSS comment-terminator that broke deploy after
  # CI green).
  #
  # This job mirrors apps/web/Dockerfile's build sequence exactly: build
  # @growth/shared (workspace dependency), then `next build` apps/web. It
  # does NOT depend on lint-and-typecheck/test, so a CSS-only PR gets the
  # signal fast. Independent of the apps/api baseline.
  #
  # NEXT_PUBLIC_API_URL is set to a placeholder — next build bakes it into
  # the client bundle at build time but the build itself succeeds with any
  # value. The placeholder avoids accidentally hardcoding the prod URL into
  # CI runs.
  #
  # Memory: feedback_ci_build_is_tsc_not_next_build.md. Sibling to
  # feedback_smoke_as_real_gate_kan_965_integration_seam and
  # feedback_visual_gate_as_real_gate_for_ui_slices.
  web-build:
    name: Web Build (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/db
      - name: Build @growth/shared (apps/web dependency)
        run: npm run build --workspace=@growth/shared
      - name: Build apps/web (next build — PostCSS + Tailwind exercised)
        run: npm run build --workspace=@growth/web
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.growth.local
          NODE_OPTIONS: --max-old-space-size=4096
